<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Problem Threads: Measuring the Impossible</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <p class="kicker">A Problem Thread</p>
    <h1 id="thread-question">How do you measure something that never ends?</h1>
    <p class="intro" id="thread-intro"></p>
  </header>

  <main>
    <section class="rail-section" aria-label="The thread, one episode at a time">
      <p class="rail-hint">Tap a stop on the thread.</p>
      <div class="rail-scroll">
        <div class="rail" id="rail" role="tablist" aria-label="Episodes in this thread"></div>
      </div>
    </section>

    <section class="detail" id="detail" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <p>Prototype for the Discovery Timeline project. One thread, four people, one runaway number.</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
