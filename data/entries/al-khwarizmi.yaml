id: al-khwarizmi-820
title: al-Khwarizmi and the word algebra
date: "0820"
date_label: "c. 820"
era: house-of-wisdom
place:
  name: Baghdad, Iraq (House of Wisdom)
  lat: 33.3152
  lng: 44.3661
  reason: Worked at the Bayt al-Hikma (House of Wisdom), where Greek, Indian, and Persian mathematical works were translated into Arabic
people:
  - name: Muhammad ibn Musa al-Khwarizmi
    role: mathematician, astronomer, geographer
field: algebra, arithmetic
idea: Wrote Al-Kitab al-Mukhtasar fi Hisab al-Jabr wal-Muqabala, the foundational text of algebra, showing how to solve equations by completing and balancing terms.
unlocked: Gave algebra its name and method. Introduced Hindu-Arabic numerals (1, 2, 3) to the Latin world through a separate arithmetic book.
hook: In Baghdad, al-Khwarizmi sat inside the House of Wisdom and wrote a book for people who needed answers.
sources:
  - al-Khwarizmi, Al-Kitab al-Mukhtasar fi Hisab al-Jabr wal-Muqabala (c. 820)
