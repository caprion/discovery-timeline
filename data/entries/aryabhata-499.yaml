idea: In the Aryabhatiya, Aryabhata gave pi as 62832/20000, accurate to four decimal places, and set out one of the first systematic sine tables.
unlocked: His verse handbook shaped Indian astronomy and trigonometry for centuries and gave later scholars a compact model of mathematical writing.
hook: At 23, Aryabhata wrote pi to four decimal places in verse in the Gupta capital.
