idea: In Liber Abaci, Fibonacci showed Latin Europe how to use Hindu-Arabic numerals, place value, and practical calculation instead of Roman numerals.
unlocked: His book helped merchants, bookkeepers, and later mathematicians adopt the number system the world still uses today.
hook: Fibonacci came home from North Africa talking about the nine Indian figures and wrote the book that made Roman numerals start to look old.
