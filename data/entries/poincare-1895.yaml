idea: In Analysis Situs, Poincaré studied shapes by their connectedness, introduced the fundamental group, and helped create modern topology.
unlocked: He gave mathematicians tools for telling shapes apart without measuring them, which later led to the Poincaré Conjecture and much of twentieth-century topology.
hook: He wrote so fast colleagues joked he skipped straight to final drafts. In 1908 France put him in its literary academy for writing about science.
