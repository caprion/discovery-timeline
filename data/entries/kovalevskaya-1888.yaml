  reason: Kovalevskaya worked as professor in Stockholm, and her prize-winning rigid-body work appeared through that academic world.
people:
  - name: Sofia Kovalevskaya
    role: mathematician
field: analysis, mechanics
idea: Kovalevskaya solved a special case of how a rigid body spins around a fixed point by using hyperelliptic functions, a new class of curves and equations.
unlocked: Her work became one of the three classic integrable spinning-top cases and opened doors for later work in mechanics and mathematical physics.
hook: Sofia Kovalevskaya entered a fake marriage to leave Russia, then later won a major math prize with an anonymous paper.
