  reason: Zu Chongzhi worked in Jiankang, where the now-lost Zhui Shu was written and known to later Chinese scholars.
people:
  - name: Zu Chongzhi
    role: mathematician, astronomer
field: mathematics, astronomy
idea: Zu Chongzhi found the fraction 355/113 for pi, accurate to six decimal places, and recorded it in the lost book Zhui Shu.
unlocked: His result set a world standard for pi and showed how strong Chinese mathematical astronomy had become.
hook: While the western Roman Empire was falling apart, Zu Chongzhi in Nanjing found a value of pi Europe would not match for about 1000 years.
