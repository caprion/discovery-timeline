  reason: Wrote and mailed his famous first letter to G.H. Hardy on 16 January 1913 from Madras, where he worked as a clerk at the Madras Port Trust (not from Kumbakonam — he had moved to Madras by 1912)
people:
  - name: Srinivasa Ramanujan
    role: mathematician, autodidact
field: number theory, analysis, combinatorics
idea: Derived thousands of original theorems in number theory and analysis without formal training, working from a single trigonometry textbook.
unlocked: Inspired new work across combinatorics, the theory of partitions, and mock theta functions. Many of his results are still being extended today.
hook: At a clerk's desk in south India, Srinivasa Ramanujan copied pages of strange formulas into a letter and sent them to England.
