people:
  - name: Archimedes
    role: mathematician, engineer
field: geometry
idea: In Measurement of a Circle, Archimedes bounded pi between 3 10/71 and 3 1/7 by comparing a circle to inscribed and circumscribed 96-sided polygons.
unlocked: He showed how to trap a hard answer between two easier ones, a proof style that shaped later work on geometry, limits, and pi.
hook: A Roman soldier killed him in Syracuse after finding him bent over circles scratched in the sand.
