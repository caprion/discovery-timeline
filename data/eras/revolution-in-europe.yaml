description: |
  Calculus, analytic geometry, probability, group theory, modern algebra. Almost every concept in a high school math curriculum was invented in this 400-year window. Descartes put algebra on a graph. Newton and Leibniz independently invented calculus. Galois died at 20 and took group theory with him.
contributors: [Descartes, Fermat, Pascal, Newton, Leibniz, Euler, Gauss, Galois, Riemann, Cantor]
region: France, Germany, England, Switzerland