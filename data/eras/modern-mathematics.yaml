description: |
  Modern math lives in foundations: what math is, what can be computed, what can be proven. Noether rewrote algebra around symmetry. Gödel showed that any interesting system has statements it cannot prove. Turing invented the abstract model of every computer. Ramanujan arrived from India with thousands of theorems and no formal training.
contributors: [Noether, Ramanujan, Gödel, Turing, Kolmogorov, Grothendieck]
